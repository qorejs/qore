name: Publish to npm

on:
  release:
    types: [published]
  
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (core|devtools|primitives)'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - devtools
          - primitives

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    if: github.event.inputs.package == 'core' || github.event_name == 'release'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build package
        run: pnpm build
        working-directory: packages/core
      
      - name: Run tests
        run: pnpm test
        working-directory: packages/core
      
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Print package info
        run: |
          echo "✅ Published qore to npm"
          echo "📦 Package: $(jq -r '.name' package.json)@$(jq -r '.version' package.json)"
          echo "🔗 https://www.npmjs.com/package/$(jq -r '.name' package.json)"
        working-directory: packages/core

  publish-devtools:
    if: github.event.inputs.package == 'devtools'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build package
        run: pnpm build
        working-directory: packages/devtools
      
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/devtools
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Print package info
        run: |
          echo "✅ Published @qore/devtools to npm"
          echo "🔗 https://www.npmjs.com/package/@qore/devtools"
        working-directory: packages/devtools

  publish-primitives:
    if: github.event.inputs.package == 'primitives'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build package
        run: pnpm build
        working-directory: packages/primitives
      
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/primitives
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Print package info
        run: |
          echo "✅ Published @qore/primitives to npm"
          echo "🔗 https://www.npmjs.com/package/@qore/primitives"
        working-directory: packages/primitives
