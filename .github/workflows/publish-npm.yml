name: Publish to npm

on:
  release:
    types: [published]
  
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (core|devtools|primitives)'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - devtools
          - primitives
      version:
        description: 'Version to publish (e.g., 0.6.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        package: ${{ github.event.inputs.package && fromJson('["packages/" ~ github.event.inputs.package]') || fromJson('["packages/core"]') }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build package
        run: pnpm -r run build
        working-directory: ${{ matrix.package }}
      
      - name: Run tests
        run: pnpm test
        working-directory: ${{ matrix.package }}
      
      - name: Publish to npm
        run: npm publish --access public
        working-directory: ${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Print package info
        run: |
          echo "✅ Published ${{ matrix.package }} to npm"
          echo "📦 Package: $(cat package.json | jq -r '.name')@$(cat package.json | jq -r '.version')"
          echo "🔗 https://www.npmjs.com/package/$(cat package.json | jq -r '.name')"
        working-directory: ${{ matrix.package }}
